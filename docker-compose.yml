services:
  nginx:
    image: nginx:1.25-alpine
    container_name: rai_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./media:/app/media
    depends_on:
      - web
      
  web:
    build: .
    container_name: rai_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUNNING_IN_DOCKER: "true"
      REDIS_URL: redis://redis:6379/0
      RUN_MIGRATIONS: "true"
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    depends_on:
      - redis
      
  celery_ai:
    build: .
    container_name: rai_celery_ai
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUNNING_IN_DOCKER: "true"
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    depends_on:
      - redis
      - web
    command: celery -A Rai_Backend worker --pool=gevent --concurrency=100 -Q ai_queue -n worker_ai@%h --loglevel=info
    
  celery_general:
    build: .
    container_name: rai_celery_general
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUNNING_IN_DOCKER: "true"
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    depends_on:
      - redis
      - web
    command: celery -A Rai_Backend worker --pool=prefork --concurrency=4 -Q celery -n worker_general@%h --loglevel=info

  celery_beat:
    build: .
    container_name: rai_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUNNING_IN_DOCKER: "true"
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
    depends_on:
      - redis
      - web
    command: celery -A Rai_Backend beat --loglevel=info
    
  redis:
    image: redis:7-alpine
    container_name: rai_redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data

volumes:
  media_volume:
  redis_data: